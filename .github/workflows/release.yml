name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from plugin file
        id: version
        run: |
          VERSION=$(grep -oP 'Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' wp-banjiabao.php | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Detected version: v$VERSION"

      - name: Check if tag already exists
        id: check_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q "${{ steps.version.outputs.tag }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Tag ${{ steps.version.outputs.tag }} already exists, skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ Tag ${{ steps.version.outputs.tag }} is new, proceeding with release"
          fi

      - name: Build release package
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          mkdir -p dist
          # 复制插件文件，排除 .git 等开发文件
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='dist' \
            --exclude='node_modules' \
            --exclude='vendor/*/vendor' \
            ./ dist/wp-banjiabao/
          
          cd dist
          zip -r "../wp-banjiabao-${{ steps.version.outputs.tag }}.zip" wp-banjiabao/
          cd ..
          echo "📁 Package: wp-banjiabao-${{ steps.version.outputs.tag }}.zip"
          ls -lh wp-banjiabao-${{ steps.version.outputs.tag }}.zip

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

          gh release create "${{ steps.version.outputs.tag }}" \
            "wp-banjiabao-${{ steps.version.outputs.tag }}.zip" \
            --title "WP搬家宝 ${{ steps.version.outputs.tag }}" \
            --notes "## WP搬家宝 ${{ steps.version.outputs.tag }}

          ### 📥 安装方式
          1. 下载 \`wp-banjiabao-${{ steps.version.outputs.tag }}.zip\`
          2. WordPress 后台 → 插件 → 安装插件 → 上传插件
          3. 选择 ZIP 文件 → 立即安装 → 启用

          ### 📝 更新日志
          请查看 \`readme.txt\` 中的 Changelog 章节。"
